name: Japan Finance Newsletter

on:
  schedule:
    # 毎週日曜日 23:00 JST (14:00 UTC)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    # 手動実行ボタンも有効化

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect market data
        run: python src/collect_data.py

      - name: Generate newsletter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/generate_newsletter.py

      - name: Prepare beehiiv HTML
        run: python src/post_to_beehiiv.py

      - name: Generate X post text
        run: python src/post_to_x.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output
          path: |
            data/weekly_data.json
            data/newsletter_draft.json
            data/post_ready.html
            data/post_summary.txt
            data/x_post.txt
          retention-days: 7
