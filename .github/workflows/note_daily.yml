# .github/workflows/note_daily.yml
name: Note毎日自動投稿

on:
  #schedule:
    # 毎朝7:00 JST = UTC 22:00（前日）
    - #cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '記事モード (investor / exam / light)'
        required: false
        default: 'investor'

jobs:
  post-note-article:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      # ── 曜日でモードを自動切り替え ──────────────────
      # 月・木 → investor（投資家向け）
      # 火・金 → exam（受験向け）
      # 水・土 → light（ライト経済）
      # 日     → investor（メイン）
      - name: モード決定
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
            case $DOW in
              1|4|7) echo "mode=investor" >> $GITHUB_OUTPUT ;;
              2|5)   echo "mode=exam"     >> $GITHUB_OUTPUT ;;
              3|6)   echo "mode=light"    >> $GITHUB_OUTPUT ;;
              *)     echo "mode=investor" >> $GITHUB_OUTPUT ;;
            esac
          fi
          echo "選択モード: $(cat $GITHUB_OUTPUT | grep mode)"

      # ── データ収集 ─────────────────────────────────
      - name: 市場データ収集
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FINNHUB_KEY:       ${{ secrets.FINNHUB_KEY }}
        run: python src/collect_data.py

      - name: 海外インテル収集
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FINNHUB_KEY:       ${{ secrets.FINNHUB_KEY }}
        run: python src/collect_overseas_intel.py

      # ── 記事生成 ─────────────────────────────────
      - name: Note記事生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/generate_note_jp.py --mode ${{ steps.mode.outputs.mode }}

      # ── Note投稿 ─────────────────────────────────
      - name: Noteに投稿
        env:
          NOTE_EMAIL:          ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD:       ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/post_to_note.py

      # ── アーティファクト保存 ──────────────────────
      - name: アーティファクト保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: note-daily-${{ github.run_id }}
          path: |
            data/note_draft.json
            data/note_post.txt
            data/screenshots/
          retention-days: 14
