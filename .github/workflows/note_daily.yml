# .github/workflows/note_daily.yml
name: Note毎日自動投稿

on:
  schedule:
    # 毎朝7:00 JST (= UTC 22:00 前日) に実行
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動テスト実行用

jobs:
  post-note:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # ── データ収集（毎日最新情報を取得） ──────────────────
      - name: Collect market data
        run: python src/collect_data.py

      - name: Collect overseas intel
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FINNHUB_KEY:       ${{ secrets.FINNHUB_KEY }}
        run: python src/collect_overseas_intel.py

      # ── Note記事を生成 ────────────────────────────────────
      - name: Generate note article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/generate_note_jp.py

      # ── Noteへ投稿 ────────────────────────────────────────
      - name: Post to Note
        env:
          NOTE_EMAIL:        ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD:     ${{ secrets.NOTE_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/post_to_note.py

      # ── 成果物を保存（デバッグ・失敗時の確認用） ──────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()  # 失敗時も必ず保存
        with:
          name: note-daily-${{ github.run_number }}
          path: |
            data/note_draft.json
            data/note_post.txt
            data/screenshots/
          retention-days: 14
